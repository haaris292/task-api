apiVersion: v1
kind: Service

metadata:
  name: task-api-service

  labels:
    app: task-api

spec:
  type: NodePort

  selector:
    app: {{ .Values.app.name }}

  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}
      nodePort: {{ .Values.app.nodePort }}