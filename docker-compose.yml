services:

  postgres:
    image: postgres:17
    container_name: postgres-db

    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpassword
      POSTGRES_DB: taskdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  task-api:
    build: .
    container_name: task-api

    depends_on:
      - postgres

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: taskuser
      DB_PASSWORD: taskpassword
      DB_NAME: taskdb

    ports:
      - "8080:8080"

volumes:
  postgres_data: